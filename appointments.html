<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DoctorCare — Appointments</title>

<link rel="stylesheet" href="css/style.css">

<style>

.table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

.table th{
text-align:left;
padding:12px;
background:#f0f4f8;
}

.table td{
padding:12px;
border-top:1px solid #e6e6e6;
}

.status{
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.pending{
background:#fff4cc;
}

.completed{
background:#d4edda;
}

</style>

</head>

<body class="app-layout">

<!-- SIDEBAR -->
<aside class="sidenav">

<div class="logo">
<div class="logo-mark">+</div>
<div class="logo-text">DoctorCare</div>
</div>

<nav>

<button class="snav" onclick="navigate('doctor-dashboard.html')">Dashboard</button>

<button class="snav active">Appointments</button>

<button class="snav" onclick="navigate('patients.html')">Patients</button>

<button class="snav" onclick="navigate('prescriptions.html')">Prescriptions</button>

<button class="snav" onclick="navigate('earnings.html')">Earnings</button>

<button class="snav" onclick="logout()">Logout</button>

</nav>

</aside>

<!-- MAIN -->
<main class="mainpane">

<header class="main-header">

<h2>Appointments</h2>

<button class="btn small" onclick="navigate('book-appointment.html')">
+ New Appointment
</button>

</header>

<section class="panel">

<table class="table">

<thead>

<tr>
<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Problem</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="appointmentsTable">

<!-- Appointments will load here -->

</tbody>

</table>

</section>

</main>

<script src="js/app.js"></script>

<script>

/* Load appointments from storage */

const table = document.getElementById("appointmentsTable");

const appointments =
JSON.parse(localStorage.getItem("doctorcare_appointments") || "[]");

if(appointments.length === 0){

table.innerHTML = `
<tr>
<td colspan="6" style="text-align:center">
No appointments booked yet
</td>
</tr>
`;

}

appointments.forEach(a => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${a.patient}</td>
<td>${a.date}</td>
<td>${a.time}</td>
<td>${a.problem || "-"}</td>
<td>
<span class="status ${a.status === "Completed" ? "completed" : "pending"}">
${a.status}
</span>
</td>
<td>
<button class="btn tiny"
onclick="startConsult('${a.patient}')">
Start Consultation
</button>
</td>
`;

table.appendChild(row);

});

</script>

</body>
</html>
